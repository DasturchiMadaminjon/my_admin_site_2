{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-5">
    <h2 class="logo-text" style="font-size: 30px; color: #333;">Faculty List</h2>
    <a href="{% url 'faculty_create' %}" class="btn btn-add"><i class="fas fa-plus"></i> ADD</a>
</div>

<div class="card shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th width="10%">#</th>
                    <th width="70%">Name</th>
                    <th width="20%" class="text-center">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for obj in objects %}
                <tr>
                    <td>{{ forloop.counter }}</td>
                    <td>{{ obj.name }}</td>
                    <td class="text-center">
                        <a href="{% url 'faculty_update' obj.id %}" class="action-btn btn-edit" title="Edit"><i
                                class="fas fa-pencil-alt"></i></a>
                        <a href="{% url 'faculty_delete' obj.id %}" class="action-btn btn-delete" title="Delete"><i
                                class="fas fa-trash-alt"></i></a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center py-5">Ro'yxat bo'sh</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
