{% extends 'base.html' %}

{% block content %}
<div class="mb-4">
    <h2 class="fw-bold">{% if obj %}Update{% else %}Create{% endif %} Subject</h2>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">Save changes</button>
                        <a href="{% url 'subject_list' %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
